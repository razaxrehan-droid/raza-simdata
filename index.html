<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIM & CNIC Database Checker - FAMOFC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .search-type {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 10px;
        }

        .type-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .type-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            margin-top: 25px;
            display: none;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .records-count {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .search-badge {
            background: #4caf50;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .record-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .record-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .record-field {
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
        }

        .field-label {
            font-weight: 700;
            color: #667eea;
            min-width: 80px;
            font-size: 14px;
        }

        .field-value {
            color: #333;
            word-break: break-word;
            flex: 1;
        }

        .credit {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .error-message {
            background: #fee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 10px;
            color: #c62828;
        }

        .example-numbers {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .example-numbers span {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 5px;
            margin: 0 3px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-block;
            margin-bottom: 5px;
        }

        .example-numbers span:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            
            .input-wrapper {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            .field-label {
                min-width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📱 SIM & CNIC Database Checker</h1>
                <p>Get SIM owner information by phone number or CNIC</p>
            </div>
            <div class="content">
                <div class="search-type">
                    <button class="type-btn active" onclick="setSearchType('phone')">📞 Phone Number</button>
                    <button class="type-btn" onclick="setSearchType('cnic')">🆔 CNIC Number</button>
                </div>

                <div class="input-group">
                    <label id="inputLabel">📞 Phone Number</label>
                    <div class="input-wrapper">
                        <input type="text" id="searchInput" placeholder="Enter number (e.g., 3001234567)" autocomplete="off">
                        <button id="checkBtn" onclick="checkQuery()">🔍 Search</button>
                    </div>
                    <div class="example-numbers" id="exampleNumbers">
                        💡 Try: 
                        <span onclick="setExample('3001234567')">3001234567</span>
                        <span onclick="setExample('3012345678')">3012345678</span>
                        <span onclick="setExample('3023456789')">3023456789</span>
                    </div>
                </div>

                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px; color: #666;">Fetching data...</p>
                </div>

                <div class="result" id="result"></div>
                <div class="credit">Powered by FAMOFC API</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://famofc.site/api/database.php';
        let currentSearchType = 'phone';

        function setSearchType(type) {
            currentSearchType = type;
            
            // Update button styles
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update input label and placeholder
            const inputLabel = document.getElementById('inputLabel');
            const searchInput = document.getElementById('searchInput');
            const exampleDiv = document.getElementById('exampleNumbers');
            
            if (type === 'phone') {
                inputLabel.innerHTML = '📞 Phone Number';
                searchInput.placeholder = 'Enter number (e.g., 3001234567)';
                exampleDiv.innerHTML = '💡 Try: <span onclick="setExample(\'3001234567\')">3001234567</span> <span onclick="setExample(\'3012345678\')">3012345678</span> <span onclick="setExample(\'3023456789\')">3023456789</span>';
            } else {
                inputLabel.innerHTML = '🆔 CNIC Number';
                searchInput.placeholder = 'Enter CNIC (e.g., 1234512345671 or 12345-1234567-1)';
                exampleDiv.innerHTML = '💡 Try: <span onclick="setExample(\'1234512345671\')">1234512345671</span> <span onclick="setExample(\'12345-1234567-1\')">12345-1234567-1</span>';
            }
            
            // Clear previous results
            document.getElementById('result').style.display = 'none';
            searchInput.value = '';
        }

        function setExample(value) {
            document.getElementById('searchInput').value = value;
        }

        async function checkQuery() {
            const searchQuery = document.getElementById('searchInput').value.trim();
            
            if (!searchQuery) {
                showError('Please enter a search query');
                return;
            }

            // Show loader, hide previous result
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('checkBtn').disabled = true;

            try {
                const response = await fetch(`${API_URL}?q=${encodeURIComponent(searchQuery)}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    displayResult(data.data);
                } else {
                    showError(data.error || 'No data found');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to connect to API. Please check your internet connection.');
            } finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('checkBtn').disabled = false;
            }
        }

        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            
            if (!data.records || data.records.length === 0) {
                showError('No records found');
                return;
            }

            const searchTypeText = data.search_type === 'phone' ? 'Phone Number' : 'CNIC';
            const searchValue = data.search_type === 'phone' ? data.queried_number : data.queried_cnic;

            let html = `
                <div class="result-card">
                    <div class="result-header">
                        <div>
                            <strong>📊 Search Results</strong>
                            <div class="search-badge" style="margin-top: 5px;">${searchTypeText}: ${searchValue}</div>
                        </div>
                        <span class="records-count">${data.records_count || data.records.length} Record(s) Found</span>
                    </div>
            `;

            data.records.forEach((record, index) => {
                html += `
                    <div class="record-item">
                        ${data.records.length > 1 ? `<div style="font-size: 12px; color: #667eea; margin-bottom: 10px;">📌 Record #${index + 1}</div>` : ''}
                        <div class="record-field">
                            <span class="field-label">👤 Name:</span>
                            <span class="field-value">${escapeHtml(record.full_name || 'N/A')}</span>
                        </div>
                        <div class="record-field">
                            <span class="field-label">📞 Phone:</span>
                            <span class="field-value">${escapeHtml(record.phone || 'N/A')}</span>
                        </div>
                        <div class="record-field">
                            <span class="field-label">🆔 CNIC:</span>
                            <span class="field-value">${escapeHtml(record.cnic || 'N/A')}</span>
                        </div>
                        <div class="record-field">
                            <span class="field-label">📍 Address:</span>
                            <span class="field-value">${escapeHtml(record.address || 'N/A')}</span>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
        }

        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="error-message">
                    <strong>⚠️ Error:</strong> ${escapeHtml(message)}
                </div>
            `;
            resultDiv.style.display = 'block';
        }

        function escapeHtml(text) {
            if (!text) return 'N/A';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to submit
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkQuery();
            }
        });
    </script>
</body>
</html>
